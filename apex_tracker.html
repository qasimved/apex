<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEX Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin:0;padding:0}
:root{
  --red:#ef4444;--red-dark:#b91c1c;--red-dim:rgba(239,68,68,.14);--red-border:rgba(239,68,68,.25);
  --bg:#080c14;--bg2:rgba(255,255,255,.03);
  --text:#e2e8f0;--muted:#6b7280;--muted2:#374151;
  --green:#86efac;--green-dim:rgba(34,197,94,.08);--green-border:rgba(34,197,94,.25);
  --blue:#93c5fd;--blue-dim:rgba(59,130,246,.07);--blue-border:rgba(59,130,246,.2);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,.08);--amber-border:rgba(251,191,36,.25);
  --orange:#fb923c;--purple:#a78bfa;--purple-dim:rgba(167,139,250,.08);--purple-border:rgba(167,139,250,.25);
}
body{background:var(--bg);min-height:100vh;color:var(--text);font-family:'Space Mono',monospace}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(239,68,68,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,.022) 1px,transparent 1px);
  background-size:44px 44px}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
/* header */
.logo{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:var(--red);letter-spacing:.18em}
.logo span{color:rgba(239,68,68,.25)}
.tagline{font-size:8px;color:var(--muted);letter-spacing:.18em;margin-top:2px;text-transform:uppercase}
/* section */
.sec{margin-bottom:22px}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.sec-num{width:22px;height:22px;background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'Orbitron',sans-serif}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
.sec-sub{font-size:9px;color:var(--muted);margin-top:1px}
/* card */
.card{background:var(--bg2);border:1px solid var(--red-border);border-radius:10px;padding:15px}
/* label / inputs */
.lbl{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--red);margin-bottom:6px}
.inp{background:rgba(255,255,255,.04);border:1px solid var(--red-border);border-radius:6px;padding:9px 11px;color:var(--text);font-size:12px;width:100%;font-family:'Space Mono',monospace;outline:none;transition:border .15s;-webkit-appearance:none}
.inp:focus{border-color:var(--red);background:rgba(239,68,68,.06)}
.inp::placeholder{color:var(--muted)}
input[type=range]{width:100%;accent-color:var(--red);cursor:pointer}
textarea.inp{resize:vertical;min-height:72px;font-size:10px;line-height:1.6}
/* toggles */
.tog-row{display:flex;gap:6px}
.tog{flex:1;padding:9px 4px;border-radius:6px;border:1px solid var(--red-border);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-family:'Space Mono',monospace;letter-spacing:.03em;transition:all .15s;text-align:center}
.tog.on{background:rgba(239,68,68,.82);border-color:var(--red);color:#fff;font-weight:700}
.tog:active{opacity:.8}
/* soreness */
.sor-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sor-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:7px;padding:8px 10px}
.sor-pills{display:flex;gap:3px;margin-top:5px}
.pill{flex:1;padding:4px 2px;border-radius:4px;border:1px solid rgba(255,255,255,.07);background:transparent;color:var(--muted);font-size:8px;font-family:'Space Mono',monospace;cursor:pointer;text-align:center;transition:all .12s}
.pill.none.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#e2e8f0}
.pill.mild.on{background:rgba(251,191,36,.14);border-color:rgba(251,191,36,.4);color:var(--amber)}
.pill.moderate.on{background:rgba(249,115,22,.14);border-color:rgba(249,115,22,.4);color:var(--orange)}
.pill.severe.on{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.5);color:#f87171}
/* badges */
.badge{padding:3px 7px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge-active{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.4);color:#fca5a5}
.badge-clear{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green)}
.badge-unk{background:rgba(107,114,128,.08);border:1px solid rgba(107,114,128,.15);color:var(--muted)}
.badge-due{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:var(--amber)}
.badge-full{background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple)}
.badge-zero{background:rgba(107,114,128,.08);border:1px solid rgba(107,114,128,.15);color:var(--muted)}
/* scan */
.scan-zone{border:2px dashed rgba(239,68,68,.22);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(239,68,68,.02)}
.scan-zone:hover{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04)}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.img-card{background:rgba(0,0,0,.4);border:1px solid rgba(239,68,68,.18);border-radius:7px;overflow:hidden;position:relative}
.img-card img{width:100%;max-height:100px;object-fit:cover;display:block}
.img-card-body{padding:7px}
.img-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.75);border:1px solid rgba(239,68,68,.4);border-radius:3px;color:#f87171;font-size:9px;padding:2px 6px;cursor:pointer;font-family:'Space Mono',monospace}
.scan-mini{width:100%;margin-top:5px;padding:5px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:5px;color:#f87171;font-size:9px;cursor:pointer;font-family:'Space Mono',monospace}
.scan-mini:disabled{opacity:.4;cursor:not-allowed}
/* alerts */
.alert{border-radius:7px;padding:10px 13px;font-size:10px;line-height:1.65;margin-bottom:12px}
.a-green{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green)}
.a-amber{background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber)}
.a-blue{background:var(--blue-dim);border:1px solid var(--blue-border);color:var(--blue)}
.a-purple{background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple)}
/* spinner */
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
/* buttons */
.btn{background:linear-gradient(135deg,var(--red),var(--red-dark));border:none;border-radius:8px;padding:14px;color:#fff;font-weight:700;cursor:pointer;width:100%;font-size:12px;font-family:'Space Mono',monospace;letter-spacing:.06em;transition:opacity .15s}
.btn:active{opacity:.82}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 12px;color:var(--muted);font-size:9px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;white-space:nowrap}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:var(--text)}
.btn-sm{background:transparent;border:1px solid var(--red-border);border-radius:5px;padding:6px 11px;color:#f87171;font-size:9px;cursor:pointer;font-family:'Space Mono',monospace;white-space:nowrap}
.btn-sm:hover{background:var(--red-dim)}
.btn-green{background:transparent;border:1px solid var(--green-border);border-radius:6px;padding:9px 13px;color:var(--green);font-size:10px;cursor:pointer;font-family:'Space Mono',monospace;white-space:nowrap}
.btn-green:hover{background:var(--green-dim)}
.btn-purple{background:transparent;border:1px solid var(--purple-border);border-radius:6px;padding:9px 13px;color:var(--purple);font-size:10px;cursor:pointer;font-family:'Space Mono',monospace;white-space:nowrap}
.btn-purple:hover{background:var(--purple-dim)}
/* ── CALENDAR */
.cal-wrap{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.cal-title{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);letter-spacing:.06em}
.cal-nav{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:var(--muted);font-size:14px;padding:4px 10px;cursor:pointer;font-family:'Space Mono',monospace}
.cal-nav:hover{background:rgba(255,255,255,.06);color:var(--text)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 8px 0}
.cal-dow-cell{text-align:center;font-size:8px;font-weight:700;color:var(--muted2);padding:4px 0;letter-spacing:.06em;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:6px 8px 10px}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;border:1.5px solid transparent}
.cal-cell:hover{background:rgba(255,255,255,.06)}
.cal-cell.other-month{opacity:.2;cursor:default}
.cal-cell.other-month:hover{background:none}
.cal-cell.is-today{border-color:var(--red)!important}
.cal-cell.logged-gym{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3)}
.cal-cell.logged-gym:hover{background:rgba(239,68,68,.28)}
.cal-cell.logged-bands{background:rgba(251,146,60,.15);border-color:rgba(251,146,60,.3)}
.cal-cell.logged-bands:hover{background:rgba(251,146,60,.25)}
.cal-cell.logged-cardio{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.25)}
.cal-cell.logged-rest{background:rgba(107,114,128,.12);border-color:rgba(107,114,128,.18)}
.cal-cell.unlogged{border:1.5px dashed rgba(255,255,255,.1)}
.cal-cell.unlogged:hover{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.06)}
.cal-cell.future{opacity:.25;cursor:default;pointer-events:none}
.cal-num{font-size:10px;font-weight:700;line-height:1;font-family:'Orbitron',sans-serif}
.cal-icon{font-size:12px;line-height:1;margin-top:2px}
.cal-num-only{font-size:11px;font-weight:700;color:var(--muted2);line-height:1}
/* ── LOG SCREEN (full-page) */
.ls-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.07)}
.ls-back{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--muted);font-size:11px;padding:7px 12px;cursor:pointer;font-family:'Space Mono',monospace}
.ls-back:hover{background:rgba(255,255,255,.05);color:var(--text)}
.ls-title{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
.ls-subtitle{font-size:9px;color:var(--muted);margin-top:2px}
/* ── quick-log overlay removed */
/* ── LAST SESSION MODE */
.lsm-row{display:flex;gap:6px;margin-bottom:14px}
.lsm-btn{flex:1;padding:10px 4px;border-radius:7px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--muted);cursor:pointer;font-size:9px;font-family:'Space Mono',monospace;text-align:center;transition:all .15s;line-height:1.5}
.lsm-btn.on-gym{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;font-weight:700}
.lsm-btn.on-rest{background:rgba(107,114,128,.12);border-color:rgba(107,114,128,.25);color:var(--muted);font-weight:700}
.lsm-btn.on-unk{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:var(--amber);font-weight:700}
/* ── output */
.out-wrap{background:#000;border:1px solid rgba(239,68,68,.3);border-radius:9px;overflow:hidden;margin-bottom:12px}
.out-head{background:rgba(239,68,68,.1);padding:8px 13px;font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--red);text-transform:uppercase;display:flex;justify-content:space-between}
.out-body{padding:14px;font-size:10px;color:#86efac;line-height:1.8;word-break:break-word;white-space:pre-wrap;font-family:'Space Mono',monospace;max-height:440px;overflow-y:auto}
.out-body::-webkit-scrollbar{width:3px}
.out-body::-webkit-scrollbar-thumb{background:rgba(239,68,68,.3);border-radius:2px}
.token-bar{display:flex;gap:0;border:1px solid rgba(255,255,255,.06);border-radius:7px;overflow:hidden;margin-bottom:12px}
.token-stat{flex:1;text-align:center;padding:9px 8px;background:rgba(0,0,0,.3)}
.token-stat+.token-stat{border-left:1px solid rgba(255,255,255,.06)}
.token-val{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;line-height:1}
.token-lbl{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
/* backup panel */
.bk-panel{background:rgba(167,139,250,.04);border:1px solid var(--purple-border);border-radius:10px;overflow:hidden}
.bk-header{padding:12px 15px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.bk-chev{color:var(--muted);font-size:10px;transition:transform .2s}
.bk-chev.open{transform:rotate(180deg)}
.bk-body{padding:0 15px 15px;border-top:1px solid rgba(167,139,250,.12)}
/* api key */
.key-box{background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.18);border-radius:9px;padding:13px;margin-bottom:20px}
/* tabs */
.tab-bar{display:flex;gap:0;border:1px solid var(--red-border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.tab-btn{flex:1;padding:10px 8px;background:transparent;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;border-right:1px solid var(--red-border)}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:rgba(239,68,68,.15);color:var(--red)}
/* history editor */
.he-entry{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:9px;overflow:hidden;margin-bottom:7px}
.he-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer}
.he-edit-btn{background:rgba(147,197,253,.08);border:1px solid rgba(147,197,253,.2);border-radius:5px;color:var(--blue);font-size:9px;padding:4px 8px;cursor:pointer;font-family:'Space Mono',monospace}
.he-del-btn{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:5px;color:#f87171;font-size:9px;padding:4px 8px;cursor:pointer;font-family:'Space Mono',monospace}
.he-form{padding:13px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)}
.mcheck-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.mcheck{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);cursor:pointer}
.mcheck.on{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}
.mcheck-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0}
.mcheck.on .mcheck-dot{background:var(--red)}
.mcheck-lbl{font-size:9px;font-family:'Space Mono',monospace;text-transform:capitalize;color:var(--muted)}
.mcheck.on .mcheck-lbl{color:#fca5a5;font-weight:700}
.gym-ref-scan{margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.35);border-radius:5px;font-size:8px;color:var(--green);line-height:1.65;font-family:'Space Mono',monospace;white-space:pre-wrap;max-height:80px;overflow:hidden;position:relative}
.gym-ref-scan::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
hr{border:none;border-top:1px solid rgba(239,68,68,.1);margin:11px 0}
.row-wrap{display:flex;gap:6px;flex-wrap:wrap}
.footer{margin-top:32px;padding-top:14px;border-top:1px solid rgba(239,68,68,.07);font-size:8px;color:var(--muted2);text-align:center;letter-spacing:.1em}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const MUSCLES=['chest','back','shoulders','biceps','triceps','forearms','legs','calves'];
const MPS_H={chest:48,back:48,shoulders:36,biceps:36,triceps:36,forearms:24,legs:48,calves:36};
const HISTORY_KEEP_DAYS=84,HISTORY_PACKET_DAYS=14;
const MUSCLE_KW={
  chest:['chest press','bench press','pec deck','chest fly','cable fly','incline press','decline press','dumbbell press','db press','push up','pushup','chest'],
  back:['lat pulldown','pull-down','pulldown','seated row','cable row','t-bar row','barbell row','db row','dumbbell row','pull up','pullup','chin up','chinup','deadlift','back extension','back'],
  shoulders:['shoulder press','overhead press',' ohp ','military press','arnold press','lateral raise','front raise','rear delt','upright row','shoulder','delt'],
  biceps:['barbell curl','ez bar curl','preacher curl','concentration curl','hammer curl','incline curl','cable curl','bicep curl',' curl','bicep'],
  triceps:['tricep pushdown','skull crusher','close grip bench','overhead tricep','rope pushdown','tricep extension','tricep dip','tricep','pushdown'],
  forearms:['wrist curl','reverse curl','forearm','farmer carry'],
  legs:['squat','leg press','lunge','leg curl','leg extension','romanian deadlift','rdl','hip thrust','glute bridge','hack squat','bulgarian','step up','hamstring','quad','glute','leg day'],
  calves:['standing calf','seated calf','donkey calf','calf raise','calf press','calf']
};

// ── TIME
const pad=n=>String(n).padStart(2,'0');
function nowDT(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());}
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDT(s){if(!s)return'—';const d=new Date(s);return DAYS[d.getDay()]+' '+pad(d.getDate())+' '+MONS[d.getMonth()]+' '+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDS(s){if(!s)return'—';const d=new Date(s);return DAYS[d.getDay()]+' '+pad(d.getDate())+' '+MONS[d.getMonth()];}
function fmtDF(s){if(!s)return'—';const d=new Date(s);return pad(d.getDate())+' '+MONS[d.getMonth()]+' '+d.getFullYear();}
function hDiff(a,b){if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/360000)/10;}
function daysAgo(s){if(!s)return null;return Math.floor((Date.now()-new Date(s))/86400000);}
function dateKey(s){return(s||'').slice(0,10);}
function todayKey(){return dateKey(nowDT());}
function keyToISO(k){return k+'T12:00';}
function eLbl(v){if(v<=2)return'DEAD';if(v<=4)return'LOW';if(v<=6)return'OK';if(v<=8)return'GOOD';return'FIRED UP';}

// ── MUSCLES
function detectMuscles(t){if(!t)return[];const l=t.toLowerCase();return MUSCLES.filter(m=>MUSCLE_KW[m].some(kw=>l.includes(kw)));}
function extractDuration(t){if(!t)return null;const m=t.match(/DURATION[:\s]+([^\n]+)/i);return m?m[1].trim():null;}
// ── SAVE TODAY'S CHECK-IN
function saveAll(){
  const key=dateKey(S.sessionDT);
  S.history=S.history.filter(h=>dateKey(h.date)!==key);
  S.history.unshift({
    date:S.sessionDT,dayType:S.dayType,energy:S.energy,
    muscles:[],
    scanText:'',
    duration:''
  });
  S.history.sort((a,b)=>new Date(b.date)-new Date(a.date));
  persist();
  S.sessionSaved=true;render();
}

// ── STATE
let S={
  apiKey:'',dayType:'gym',energy:7,
  soreness:Object.fromEntries(MUSCLES.map(m=>[m,'none'])),
  lastSessionMode:'gym', // kept for migration compat only — packet now always reads from history
  history:[],
  // session only
  keyOpen:false,bkOpen:false,showImport:false,importText:'',
  outputGenerated:false,outputText:'',sessionSaved:false,
  apexNote:'', // free-text context for today's session
  sessionDT:nowDT(),
  // calendar
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  // full log screen {key, dayType, energy, datetime, images, manualMuscles, notes, inputMode, isEdit, editIdx, existingScanText}
  logScreen:null,
  activeTab:'session',editIdx:null,editBuf:{}
};

// ── STORAGE
function loadStorage(){
  const KEYS=['apex_v9','apex_v8','apex_v7','apex_v6','apex_v5','apex_v4'];
  for(const key of KEYS){
    try{
      const r=localStorage.getItem(key);if(!r)continue;
      const d=JSON.parse(r);
      ['apiKey','dayType','energy','soreness','history'].forEach(f=>{if(d[f]!==undefined)S[f]=d[f];});
      if(d.lastSessionMode!==undefined)S.lastSessionMode=d.lastSessionMode;
      else if(d.lastUnknown===true)S.lastSessionMode='unknown';
      if(key!=='apex_v9')persist();
      break;
    }catch(e){}
  }
  pruneHistory();
}
function persist(){
  pruneHistory();

}

function logEntry(key,type,energy,muscles,scanText,duration,datetime){

// ── FREQUENCY
function getFrequency(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const tk=todayKey();
  const recent=S.history.filter(h=>new Date(h.date)>cutoff&&dateKey(h.date)!==tk&&(h.dayType==='gym'||h.dayType==='bands'));
  const freq=Object.fromEntries(MUSCLES.map(m=>[m,0]));
  const lastTrained=Object.fromEntries(MUSCLES.map(m=>[m,null]));
  recent.forEach(e=>{(e.muscles||[]).forEach(m=>{freq[m]++;if(!lastTrained[m]||new Date(e.date)>new Date(lastTrained[m]))lastTrained[m]=e.date;});});
  return{freq,lastTrained};
}

function buildFullExport(){

function parseImport(text){
  const entries=[];
  text.split(/\n---\n?/).filter(b=>b.includes('DATE:')).forEach(block=>{
    try{
      const lines=block.split('\n');
      const get=k=>{const l=lines.find(l=>l.startsWith(k+':'));return l?l.slice(k.length+1).trim():'';};
      const si=block.indexOf('\nSCAN:\n');const scanText=si>=0?block.slice(si+7).trim():'';
      const entry={date:get('DATE'),dayType:get('TYPE')||'gym',energy:parseInt(get('ENERGY'))||7,muscles:(get('MUSCLES')||'').split(',').filter(Boolean),duration:get('DURATION'),scanText};
      if(entry.date)entries.push(entry);
    }catch(e){}
  });
  return entries;
}

// ── PACKET
function buildHistoryBlock(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-HISTORY_PACKET_DAYS);
  const tk=todayKey();
  const entries=S.history.filter(h=>new Date(h.date)>cutoff&&dateKey(h.date)!==tk);
  if(!entries.length)return null;
  const{freq,lastTrained}=getFrequency();
  const due=MUSCLES.filter(m=>freq[m]===1&&lastTrained[m]);
  const zero=MUSCLES.filter(m=>freq[m]===0);
  const complete=MUSCLES.filter(m=>freq[m]>=2);
  const L=['━━ TRAINING HISTORY — LAST 14 DAYS ━━━━━━━'];
  entries.forEach(h=>{
    if(h.dayType==='rest'){
      L.push(fmtDS(h.date)+' — REST');
      return;
    }
    if(h.dayType==='cardio'){
      L.push(fmtDS(h.date)+' — CARDIO'+(h.duration?' | '+h.duration:'')+(h.energy?' | E:'+h.energy+'/10':''));
      if(h.scanText&&h.scanText.trim())L.push('  '+h.scanText.split('\n').join('\n  '));
      return;
    }
    if(h.dayType==='bands'){
      const ms=(h.muscles||[]).length>0?h.muscles.map(m=>m.toUpperCase()).join(', '):'(muscles unknown)';
      L.push('');
      L.push(fmtDS(h.date)+' — BANDS | '+ms+(h.duration?' | '+h.duration:'')+' | E:'+h.energy+'/10');
      if(h.scanText&&h.scanText.trim()){
        const lines=h.scanText.split('\n').filter(l=>l.trim());
        lines.forEach(line=>{if(!/^SESSION:|^DURATION:/i.test(line))L.push('  '+line);});
      }else{L.push('  (no exercises logged)');}
      return;
    }
    // Gym session
    const ms=(h.muscles||[]).length>0?h.muscles.map(m=>m.toUpperCase()).join(', '):'(muscles unknown)';
    L.push('');
    L.push(fmtDS(h.date)+' — GYM | '+ms+(h.duration?' | '+h.duration:'')+' | E:'+h.energy+'/10');
    if(h.scanText&&h.scanText.trim()){
      // Include exercises — indent each line
      const lines=h.scanText.split('\n').filter(l=>l.trim());
      lines.forEach(line=>{
        // Skip header-only lines like "SESSION:" / "DURATION:" already shown, keep exercises
        if(!/^SESSION:|^DURATION:/i.test(line))L.push('  '+line);
      });
    }else{
      L.push('  (no scan — upload screenshot to see exercises)');
    }
  });
  L.push('');
  L.push('━━ WEEKLY FREQUENCY (rolling 7 days) ━━━━━');
  MUSCLES.forEach(m=>{
    const f=freq[m],last=lastTrained[m]?' — last '+fmtDS(lastTrained[m])+' ('+daysAgo(lastTrained[m])+'d ago)':' — not trained';
    L.push('  '+m.toUpperCase().padEnd(12)+': '+f+'x'+last+(f===0?' ← NOT TRAINED':f===1?' ← DUE 2ND SESSION':' ✓ target met'));
  });
  if(due.length)L.push('');
  if(due.length)L.push('DUE 2ND SESSION: '+due.map(m=>m.toUpperCase()).join(', '));
  if(zero.length)L.push('NOT TRAINED:     '+zero.map(m=>m.toUpperCase()).join(', '));
  if(complete.length)L.push('TARGET MET:      '+complete.map(m=>m.toUpperCase()).join(', '));
  L.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  return L.join('\n');
}
function buildPacket(){
  const nowV=S.sessionDT||nowDT();
  // All data comes from history — no session-tab scan state
  const lg=getLastGymSession(); // most recent gym entry in history
  const lastV=lg?.date||null;
  const hrs=hDiff(lastV,nowV);
  const allScans=lg?.scanText||'';
  const trained=lg?.muscles||[];
  let mps={};
  if(lg&&hrs!==null&&trained.length>0)trained.forEach(m=>{mps[m]=hrs<MPS_H[m]?'active':'clear';});
  const mpsActive=trained.filter(m=>mps[m]==='active'),mpsClear=trained.filter(m=>mps[m]==='clear');
  const sore=Object.entries(S.soreness).filter(([,v])=>v!=='none');
  const histBlock=buildHistoryBlock();
  const L=[];
  L.push('DATE: '+fmtDT(nowV));
  if(S.dayType==='bands'){
    L.push('DAY: BANDS (RESISTANCE) | ENERGY: '+S.energy+'/10 ['+eLbl(S.energy)+']');
    L.push('EQUIPMENT: Resistance tube bands + handles + door anchor + ankle straps + loop bands');
  }else{
    L.push('DAY: '+S.dayType.toUpperCase()+' | ENERGY: '+S.energy+'/10 ['+eLbl(S.energy)+']');
  }
  L.push('');
  if(!sore.length){L.push('SORENESS: none');}
  else{L.push('SORENESS:');sore.forEach(([m,v])=>L.push('  '+m.toUpperCase()+': '+v.toUpperCase()));}
  if(S.apexNote&&S.apexNote.trim()){
    L.push('');
    L.push('ATHLETE NOTE:');
    S.apexNote.trim().split('\n').forEach(line=>L.push('  '+line));
  }
  L.push('');
  if(lg){
    const lastLabel=lg.dayType==='bands'?'LAST BANDS SESSION':'LAST GYM SESSION';
    L.push(lastLabel+': '+fmtDT(lastV)+(hrs!==null?' ('+hrs+'h ago)':''));
    if(trained.length>0){
      if(mpsActive.length>0){L.push('MPS ACTIVE — avoid retraining:');mpsActive.forEach(m=>{const rem=Math.max(0,MPS_H[m]-hrs).toFixed(0);L.push('  '+m.toUpperCase()+': '+rem+'h remaining');});}
      if(mpsClear.length>0)L.push('MPS CLEAR — safe to train: '+mpsClear.map(m=>m.toUpperCase()).join(', '));
      const nt=MUSCLES.filter(m=>!trained.includes(m));if(nt.length)L.push('NOT TRAINED LAST SESSION: '+nt.map(m=>m.toUpperCase()).join(', '));
    }else{L.push('MPS: muscle groups not detected — see exercises below');}
  }else{L.push('LAST GYM/BANDS SESSION: none in history — use conservative baseline');}
  L.push('');
  // FLAGS
  const flags=[];
  if(S.energy<=4)flags.push('LOW ENERGY ('+S.energy+'/10) — reduce volume ~25%, drop isolation');
  else if(S.energy>=9)flags.push('PEAK ENERGY ('+S.energy+'/10) — attempt +5% load or extra compound set');
  const sevSore=MUSCLES.filter(m=>S.soreness[m]==='severe'),modSore=MUSCLES.filter(m=>S.soreness[m]==='moderate');
  if(sevSore.length)flags.push('SEVERE SORENESS ['+sevSore.map(m=>m.toUpperCase()).join(', ')+'] — avoid training');
  if(modSore.length)flags.push('MODERATE SORENESS ['+modSore.map(m=>m.toUpperCase()).join(', ')+'] — reduce load');
  if(S.soreness.shoulders==='moderate'||S.soreness.shoulders==='severe')flags.push('SHOULDER PROTOCOL — no overhead press, '+(S.dayType==='bands'?'band lateral raises only':'cable laterals only'));
  if(S.soreness.back==='severe')flags.push('BACK SEVERE — no deadlifts or heavy rows');
  mpsActive.forEach(m=>{if(hrs!==null){const rem=Math.max(0,MPS_H[m]-hrs).toFixed(0);flags.push('MPS BLOCK ['+m.toUpperCase()+'] — '+rem+'h left, skip or MEV only');}});
  if(hrs!==null&&hrs<20)flags.push('SHORT RECOVERY — '+hrs+'h only, consider cardio/mobility');
  if(flags.length){L.push('FLAGS:');flags.forEach(f=>L.push('  ⚠ '+f));L.push('');}
  // LAST WORKOUT DATA
  if(allScans){L.push('LAST WORKOUT:');L.push(allScans);}
  else if(lg){L.push('LAST WORKOUT: '+fmtDS(lg.date)+' — no exercise data (log this session in History tab with screenshot or notes)');}
  else{L.push('LAST WORKOUT: no history — log your first session in the History tab');}
  if(histBlock){L.push('');L.push(histBlock);}
  return L.join('\n');
}

async function scanLogOne(idx){
  if(!S.logScreen)return;
  const img=S.logScreen.images[idx];if(!img)return;
  if(!S.apiKey.trim()){img.scanError='No API key set.';render();return;}
  img.scanning=true;img.scanResult=null;img.scanError=null;img.detectedMuscles=null;render();
  try{
    const base64=img.dataUrl.split(',')[1],mtype=img.file.type||'image/jpeg';
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mtype,data:base64}},
        {type:'text',text:'Extract ALL workout data from this gym app screenshot.\nReturn ONLY plain text — no markdown, no backticks.\n\nFormat:\nMUSCLES_WORKED: [comma-separated from: chest, back, shoulders, biceps, triceps, forearms, legs, calves]\nSESSION: [name if visible]\nDURATION: [time if visible]\n\nEXERCISES:\n[Exercise Name] ([equipment]): [weightxreps], ...\n\nNOTES: [volume, calories, heart rate]\n\nInclude weight units. Skip invisible fields. Be precise.'}
      ]}]})
    });
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const fullText=data.content.map(b=>b.text||'').join('').trim();
    const mm=fullText.match(/MUSCLES_WORKED:\s*([^\n]+)/i);
    img.detectedMuscles=mm?mm[1].split(',').map(s=>s.trim().toLowerCase()).filter(m=>MUSCLES.includes(m)):[];
    img.scanResult=fullText.replace(/MUSCLES_WORKED:[^\n]*\n?/i,'').trim();
    S.logScreen.manualMuscles=null;
  }catch(e){img.scanError=e.message||'Scan failed.';}
  img.scanning=false;render();
}
async function scanLogAll(){

function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const today=new Date();
  const todayK=todayKey();
  // First day of month, find preceding Sunday
  const firstDay=new Date(yr,mo,1);
  const startDate=new Date(firstDay);
  startDate.setDate(startDate.getDate()-firstDay.getDay()); // back to Sunday
  // Build 42 cells (6 weeks)
  const cells=[];
  for(let i=0;i<42;i++){
    const d=new Date(startDate);
    d.setDate(startDate.getDate()+i);
    cells.push(d);
  }
  // Build lookup
  const logMap={};
  S.history.forEach(h=>{logMap[dateKey(h.date)]=h;});

  let h='<div class="cal-wrap">';
  // Header
  h+='<div class="cal-header">'
    +'<button class="cal-nav" onclick="S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}render()">‹</button>'
    +'<div class="cal-title">'+MONS[mo]+' '+yr+'</div>'
    +'<button class="cal-nav" onclick="S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}render()">›</button>'
    +'</div>';
  // DOW headers
  h+='<div class="cal-dow">'+['SUN','MON','TUE','WED','THU','FRI','SAT'].map(d=>'<div class="cal-dow-cell">'+d+'</div>').join('')+'</div>';
  // Grid
  h+='<div class="cal-grid">';
  cells.forEach(d=>{
    const key=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const isThisMonth=d.getMonth()===mo;
    const isToday=key===todayK;
    const isFuture=d>today&&!isToday;
    const entry=logMap[key];
    let cls='cal-cell';
    if(!isThisMonth)cls+=' other-month';
    else if(isFuture)cls+=' future';
    else if(entry){
      cls+=' logged-'+entry.dayType;
    }else{
      cls+=' unlogged';
    }
    if(isToday)cls+=' is-today';
    let inner='';
    if(entry&&isThisMonth&&!isFuture){
      const icon=entry.dayType==='gym'?'🏋':entry.dayType==='bands'?'💪':entry.dayType==='cardio'?'🏃':'😴';
      inner='<span class="cal-num" style="color:'+(entry.dayType==='gym'?'#fca5a5':entry.dayType==='bands'?'var(--orange)':entry.dayType==='cardio'?'var(--blue)':'var(--muted)')+'">'+d.getDate()+'</span><span class="cal-icon">'+icon+'</span>';
    }else{
      inner='<span class="cal-num-only">'+d.getDate()+'</span>';
    }
    const clickable=isThisMonth&&!isFuture&&!entry;
    const editIdx=entry&&isThisMonth?S.history.findIndex(hh=>dateKey(hh.date)===key):-1;
    h+='<div class="'+cls+'"'+(clickable?' onclick="openLogScreen(\''+key+'\')"':'')+(editIdx>=0?' onclick="startEdit('+editIdx+')"':'')+'>'
      +inner+'</div>';
  });
  h+='</div></div>';
  return h;
}

      +'<span>🏋 gym</span><span>🏃 cardio</span><span>😴 rest</span>'
      +'<span style="margin-left:4px">— tap empty day to log · tap logged day to edit</span>'
      +'</div>';
    h+=renderBackupPanel('expBtn','rev4Btn');
    h+='<div style="margin-top:18px"></div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<span style="font-size:10px;font-weight:700;color:var(--text)">'+S.history.length+' sessions</span>'
      +'<button class="btn-sm" onclick="addNewEntry()">+ Add Entry</button></div>';
    if(!S.history.length){h+='<div style="text-align:center;padding:24px 0;font-size:10px;color:var(--muted)">No sessions yet.</div>';}
    S.history.forEach((entry,i)=>{
      const tc=entry.dayType==='gym'?'var(--red)':entry.dayType==='bands'?'var(--orange)':entry.dayType==='cardio'?'var(--blue)':'var(--muted)';
      const ti=entry.dayType==='gym'?'🏋️':entry.dayType==='bands'?'💪':entry.dayType==='cardio'?'🏃':'😴';
      h+='<div class="he-entry">'
        +'<div class="he-row" onclick="openEditLogScreen('+i+')">'
        +'<div style="flex:1;display:flex;flex-direction:column;gap:3px">'
        +'<div style="font-size:11px;font-weight:700">'+fmtDS(entry.date)+' <span style="font-size:9px;color:var(--muted)">'+(entry.date||'').slice(11,16)+'</span></div>'
        +'<div style="font-size:8px;color:var(--muted)"><span style="color:'+tc+'">'+ti+' '+entry.dayType.toUpperCase()+'</span> · E:'+entry.energy+'/10'+(entry.duration?' · '+entry.duration:'')+' · '+daysAgo(entry.date)+'d ago</div>'
        +((entry.muscles||[]).length?'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">'+entry.muscles.map(m=>'<span style="padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;background:'+(entry.dayType==='bands'?'rgba(251,146,60,.1)':'rgba(239,68,68,.1)')+';border:1px solid '+(entry.dayType==='bands'?'rgba(251,146,60,.2)':'rgba(239,68,68,.2)')+';color:'+(entry.dayType==='bands'?'var(--orange)':'#fca5a5')+'">'+m+'</span>').join('')+'</div>':'')
        +(entry.scanText&&entry.dayType==='cardio'?'<div style="font-size:8px;color:var(--blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🏃 '+entry.scanText.slice(0,60)+'</div>':'')
        +(entry.scanText&&entry.dayType==='bands'?'<div style="font-size:8px;color:var(--orange);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">💪 '+entry.scanText.slice(0,60)+'</div>':'')
        +'</div>'
        +'<div style="display:flex;gap:5px;flex-shrink:0">'
        +'<button class="he-edit-btn" onclick="event.stopPropagation();openEditLogScreen('+i+')">✏</button>'
        +'<button class="he-del-btn" onclick="event.stopPropagation();if(confirm(\'Delete?\'))'+'{S.history.splice('+i+',1);persist();render()}">🗑</button>'
        +'</div></div></div>';
    });
    h+='<div class="footer">APEX v9 · CALENDAR · HISTORY · EXPORT · BANDS MODE</div>';
    app.innerHTML=h;
    return;
  }

  // ─── SESSION TAB ──────────────────────────────────
  h+='<div class="alert a-blue" style="font-size:9px">Fill all sections → Generate → paste into fresh APEX chat.</div>';

  // ── SECTION 1: TODAY
  h+='<div class="sec"><div class="sec-head"><div class="sec-num">1</div>'
    +'<div><div class="sec-title">Today</div><div class="sec-sub">Set the exact time for accurate MPS calculation</div></div></div>'
    +'<div class="card">'
    +'<div style="margin-bottom:14px"><label class="lbl">Day Type</label><div class="tog-row">'
    +['gym','bands','cardio','rest'].map(t=>'<button class="tog'+(S.dayType===t?' on':'')+'" onclick="S.dayType=\''+t+'\';persist();render()">'+(t==='gym'?'🏋️ GYM':t==='bands'?'💪 BANDS':t==='cardio'?'🏃 CARDIO':'😴 REST')+'</button>').join('')
    +'</div></div>'
    +'<div style="margin-bottom:14px">'
    +'<label class="lbl">Session Date &amp; Time</label>'
    +'<input type="datetime-local" class="inp" style="color-scheme:dark" value="'+S.sessionDT+'" oninput="S.sessionDT=this.value;render()"/>'
    +'<div style="font-size:8px;color:var(--muted);margin-top:4px">'+fmtDT(S.sessionDT)+' &nbsp;·&nbsp; used for MPS hour calculation</div>'
    +'</div>'
    +(S.dayType!=='rest'
      ?'<div><label class="lbl">Energy: <span style="color:var(--amber)">'+S.energy+'/10 — '+eLbl(S.energy)+'</span></label>'
        +'<input type="range" min="1" max="10" step="1" value="'+S.energy+'" oninput="S.energy=parseInt(this.value);persist();render()" style="margin:8px 0"/>'
        +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted2)"><span>Dead</span><span>OK</span><span>Fired Up</span></div>'
        +'</div>'
      :'<div style="font-size:9px;color:var(--muted);padding:4px 0">Rest day — recovery is part of the programme.</div>')
    +'</div></div>';

  // ── SECTION 2: BODY CHECK
  h+='<div class="sec"><div class="sec-head"><div class="sec-num">2</div>'
    +'<div><div class="sec-title">Body Check</div><div class="sec-sub">Soreness per muscle</div></div></div>'
    +'<div class="card"><div class="sor-grid">'
    +MUSCLES.map(m=>'<div class="sor-item">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:9px;color:#9ca3af;text-transform:capitalize">'+m+'</span>'
      +'<span style="font-size:8px;font-weight:700;text-transform:uppercase;color:'+(S.soreness[m]==='none'?'var(--muted)':S.soreness[m]==='mild'?'var(--amber)':S.soreness[m]==='moderate'?'var(--orange)':'#f87171')+'">'+S.soreness[m]+'</span>'
      +'</div><div class="sor-pills">'
      +['none','mild','moderate','severe'].map(o=>'<button class="pill '+o+(S.soreness[m]===o?' on':'')+'" onclick="S.soreness[\''+m+'\']=\''+o+'\';persist();render()">'+(o==='none'?'—':o.slice(0,3))+'</button>').join('')
      +'</div></div>').join('')
    +'</div>'
    +(trained.length>0&&lastV
      ?'<div style="margin-top:13px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)">'
        +'<div style="font-size:9px;color:var(--muted);margin-bottom:6px">MPS · <strong style="color:var(--text)">'+hrs+'h</strong> since last gym · based on history</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px">'
        +mpsActive.map(m=>'<span class="badge badge-active">⚡ '+m+' '+(Math.max(0,MPS_H[m]-hrs)).toFixed(0)+'h</span>').join('')
        +mpsClear.map(m=>'<span class="badge badge-clear">✓ '+m+'</span>').join('')
        +MUSCLES.filter(mu=>!trained.includes(mu)).map(m=>'<span class="badge badge-unk">— '+m+'</span>').join('')
        +'</div></div>'
      :S.history.length
        ?'<div style="margin-top:13px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)">'
          +'<div style="font-size:9px;color:var(--muted);margin-bottom:6px">Weekly frequency:</div>'
          +'<div style="display:flex;flex-wrap:wrap;gap:4px">'+MUSCLES.map(m=>{const f=freq[m];const c=f===0?'badge-zero':f===1?'badge-due':f>=2?'badge-full':'badge-zero';return'<span class="badge '+c+'">'+m+' '+f+'x</span>';}).join('')+'</div></div>'
        :'')
    // ── Apex note
    +'<div style="margin-top:14px;padding-top:13px;border-top:1px solid rgba(255,255,255,.05)">'
    +'<label class="lbl">Note for APEX <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">— optional</span></label>'
    +'<textarea class="inp" placeholder="Anything your coach should know today... e.g. sharp pain in right delt and neck, only Smith machine available, want to focus on chest, feeling tight in lower back..." oninput="S.apexNote=this.value" style="min-height:72px;margin-top:2px;font-size:10px">'+S.apexNote+'</textarea>'
    +'<div style="font-size:8px;color:var(--muted);margin-top:4px">Goes directly into your packet — APEX reads this before designing today\'s workout.</div>'
    +'</div>'
    +'</div></div>';

  // ── GENERATE
  h+='<button class="btn" style="font-size:13px;padding:15px;margin-bottom:20px" onclick="generatePacket()">'+(S.outputGenerated?'↺ REGENERATE PACKET':'⚡ GENERATE APEX PACKET')+'</button>';

  // ── OUTPUT
  if(S.outputGenerated){
    const esc=S.outputText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tokens=Math.round(S.outputText.length/4);
    h+='<div id="out-sec">'
      +'<div class="alert a-green">✓ Packet ready — open fresh APEX chat → paste → get your plan.</div>'
      +'<div class="token-bar">'
      +'<div class="token-stat"><div class="token-val" style="color:var(--green)">~'+tokens+'</div><div class="token-lbl">Tokens</div></div>'
      +'<div class="token-stat"><div class="token-val" style="color:var(--blue)">'+S.outputText.length+'</div><div class="token-lbl">Chars</div></div>'
      +'<div class="token-stat"><div class="token-val" style="color:'+(S.sessionSaved?'var(--green)':'var(--amber)')+'">'+S.history.length+'</div><div class="token-lbl">Sessions</div></div>'
      +'</div>'
      +'<div class="out-wrap"><div class="out-head"><span>APEX PACKET</span><span style="color:var(--muted)">copy → paste to new chat</span></div><div class="out-body">'+esc+'</div></div>'
      +'<button class="btn" id="cpyBtn" onclick="copyText(S.outputText,\'cpyBtn\')" style="margin-bottom:8px">📋 COPY FOR APEX CHAT</button>'
      +(S.sessionSaved
        ?'<div class="alert a-green" style="margin-bottom:8px;display:flex;align-items:center;gap:8px"><span>✓</span><span>Today logged as '+S.dayType.toUpperCase()+'.</span></div>'
        :'<button class="btn-green" style="width:100%;margin-bottom:8px;padding:12px" onclick="saveAll()">💾 SAVE TODAY TO HISTORY</button>')
      +'<button class="btn-ghost" style="width:100%" onclick="S.outputGenerated=false;S.outputText=\'\';S.sessionSaved=false;S.apexNote=\'\';S.sessionDT=nowDT();render()">↺ RESET — NEW SESSION</button>'
      +'</div>';
  }

  // ── BACKUP PANEL (bottom of session tab)
  h+='<div style="margin-top:24px">'+renderBackupPanel('expBtn2','rev4Btn2')+'</div>';

  h+='<div class="footer">APEX v9 · CALENDAR · HISTORY · EXPORT · IMPORT · BANDS MODE</div>';
  app.innerHTML=h;
}

loadStorage();render();
</script>
</body>
</html>
